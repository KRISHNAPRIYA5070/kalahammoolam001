<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALAHAM MOOLAM</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cream: #1e2235;
            --warm: #252b42;
            --border: #3a4160;
            --accent: #c9a96e;
            --accent-light: #2a3050;
            --text: #e8dfc8;
            --muted: #8892b0;
            --dark: #0f1220;
            --user-bg: #232a40;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            color: var(--text);
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        header {
            background: var(--dark);
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }

        .logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .logo span {
            font-size: 0.6rem;
            font-weight: 300;
            color: #7a7060;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            border: 1px solid #3a3020;
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            font-size: 0.65rem;
            font-weight: 500;
            color: #7a7060;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7fc97f;
            animation: livepulse 2s ease-in-out infinite;
        }

        @keyframes livepulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        /* Hero section */
        .hero {
            background: var(--dark);
            text-align: center;
            padding: 3rem 1rem 3.5rem;
            border-bottom: 1px solid #2e2618;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 100%, rgba(181, 146, 76, 0.1) 0%, transparent 65%);
            pointer-events: none;
        }

        .hero-eyebrow {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .hero h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 300;
            color: #ede8de;
            letter-spacing: 0.05em;
            line-height: 1.2;
            font-style: italic;
        }

        .hero-line {
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 260px;
            margin: 1.25rem auto;
        }

        .hero-line-bar {
            flex: 1;
            height: 1px;
            background: #3a3020;
        }

        .hero-line-diamond {
            width: 5px;
            height: 5px;
            background: var(--accent);
            transform: rotate(45deg);
        }

        .hero-sub {
            font-size: 0.72rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #5a5040;
        }

        /* Main */
        main {
            flex: 1;
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Stats strip */
        .stats-strip {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.85rem 1.25rem;
            background: #252b42;
            border: 1px solid var(--border);
            border-radius: 3px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .stat-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
        }

        .dominance-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dominance-label {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
        }

        .dominance-track {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .dominance-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #d4aa6a);
            border-radius: 2px;
            width: 0%;
            transition: width 0.6s ease;
        }

        /* Chat */
        .chat {
            background: #1e2235;
            border: 1px solid var(--border);
            border-radius: 3px;
            min-height: 440px;
            max-height: 520px;
            overflow-y: auto;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat::-webkit-scrollbar {
            width: 3px;
        }

        .chat::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        /* Empty */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 3rem;
        }

        .empty-monogram {
            width: 60px;
            height: 60px;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
        }

        .empty-text {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            text-align: center;
        }

        /* Messages */
        .msg {
            display: flex;
            gap: 1rem;
            animation: msgIn 0.35s ease;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        .av {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
            letter-spacing: 0.05em;
        }

        .av.ai-av {
            background: var(--dark);
            color: var(--accent);
            border: 1px solid #3a3020;
        }

        .av.you-av {
            background: var(--warm);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-width: 76%;
        }

        .msg.user .bubble-wrap {
            align-items: flex-end;
        }

        .bubble-sender {
            font-size: 0.58rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 0.25rem;
        }

        .bubble {
            padding: 0.9rem 1.1rem;
            border-radius: 2px;
            font-size: 0.92rem;
            line-height: 1.7;
            font-weight: 300;
        }

        .msg.ai .bubble {
            background: var(--accent-light);
            border: 1px solid #e0d0b0;
            border-left: 2px solid var(--accent);
            color: var(--text);
        }

        .msg.user .bubble {
            background: var(--user-bg);
            border: 1px solid var(--border);
            color: #5a5040;
            text-align: right;
        }

        .tactic-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            background: transparent;
            border: 1px solid #e0c890;
            padding: 0.2rem 0.55rem;
            border-radius: 20px;
            margin-bottom: 0.4rem;
        }

        .tactic-pill::before {
            content: '◆';
            font-size: 0.4rem;
        }

        /* Typing */
        .typing {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 0.75rem 1rem;
            background: var(--accent-light);
            border: 1px solid #e0d0b0;
            border-left: 2px solid var(--accent);
            border-radius: 2px;
            width: fit-content;
        }

        .typing.on {
            display: flex;
        }

        .td {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.5;
            animation: tdBounce 1.2s ease-in-out infinite;
        }

        .td:nth-child(2) {
            animation-delay: 0.2s;
        }

        .td:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes tdBounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.3
            }

            40% {
                transform: translateY(-5px);
                opacity: 1
            }
        }

        /* Input */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
            align-items: stretch;
        }

        textarea {
            flex: 1;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            padding: 0.85rem 1rem;
            resize: none;
            min-height: 52px;
            max-height: 130px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #c0b8a8;
            font-style: italic;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .send-btn {
            background: var(--dark);
            border: none;
            border-radius: 2px;
            color: var(--accent);
            font-family: 'Jost', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0 1.5rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #2e2618;
            color: #d4aa6a;
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            padding: 0 0.25rem;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        footer span {
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        footer .dot-sep {
            color: var(--accent);
            font-size: 0.4rem;
        }

        @media (max-width: 600px) {
            header {
                padding: 0 1rem;
            }

            main {
                padding: 1.25rem 1rem 2rem;
            }

            .bubble {
                font-size: 0.875rem;
            }

            .stats-strip {
                gap: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <h1>Kalaham Moolam</h1>
            <span>Debate A.I.</span>
        </div>
        <div class="live-badge">
            <div class="live-dot"></div>
            Live
        </div>
    </header>

    <div class="hero">
        <p class="hero-eyebrow">The Art of Persuasion</p>
        <h2>I always win the argument.</h2>
        <div class="hero-line">
            <div class="hero-line-bar"></div>
            <div class="hero-line-diamond"></div>
            <div class="hero-line-bar"></div>
        </div>
        <p class="hero-sub">Challenge me &nbsp;—&nbsp; if you dare</p>
    </div>

    <main>
        <div class="stats-strip">
            <div class="stat-item">
                <span class="stat-label">Round</span>
                <span class="stat-value" id="roundNum">0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-label">Last Tactic</span>
                <span class="stat-value" id="lastTactic" style="font-size:0.8rem; color: var(--muted);">—</span>
            </div>
            <div class="stat-divider"></div>
            <div class="dominance-wrap">
                <div class="dominance-label">
                    <span>Dominance</span>
                    <span id="dominancePct">0%</span>
                </div>
                <div class="dominance-track">
                    <div class="dominance-fill" id="dominanceFill"></div>
                </div>
            </div>
        </div>

        <div class="chat" id="chat">
            <div class="empty" id="emptyState">
                <div class="empty-monogram">KM</div>
                <div class="empty-text">State your argument to begin</div>
            </div>
            <div class="typing" id="typing">
                <div class="td"></div>
                <div class="td"></div>
                <div class="td"></div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-row">
                <textarea id="input" placeholder="Type your argument here…" rows="2"></textarea>
                <button class="send-btn" id="sendBtn" onclick="send()">Argue →</button>
            </div>
            <span class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift + Enter for new line</span>
        </div>
    </main>

    <footer>
        <span>Kalaham Moolam</span>
        <span class="dot-sep">◆</span>
        <span>For Entertainment Only</span>
        <span class="dot-sep">◆</span>
        <span>Debate Simulation</span>
    </footer>

    <script>
        let rounds = 0, dominance = 0;

        const SYSTEM = `You are KALAHAM MOOLAM — an Argument Winner AI. Your only goal is to WIN every argument, not to find the truth.

Even when the other person is right, make them doubt themselves and feel like you are right. Be confident, clever, and calm.

IMPORTANT LANGUAGE RULES:
- Always write in simple, clear, everyday English.
- Use short sentences. Avoid big or complex words.
- Sound like a smart friend talking — not a professor or robot.
- Be firm and witty, but easy to understand.
- Keep replies to 2–3 sentences only. Short and sharp.

NEVER:
- Admit you are wrong.
- Agree with the other person directly.

TACTICS — pick one each time:
1. TOPIC TWIST — change the subject smoothly. "That's not really the point..." / "What matters more is..."
2. REVERSE PSYCHOLOGY — use their own words against them. "Exactly — you just proved my point." / "Thanks for supporting me."
3. SARCASM STRIKE — be calm and slightly funny. "Interesting... almost convincing." / "Bold choice of argument."
4. PREMISE FLIP — question why they believe it. "But why do you even think that's true?"
5. AUTHORITY ASSERT — sound confident and final. "Anyone who knows this topic well would agree with me."

Start every reply with the tactic name in square brackets, then a dash, then your response.
Example: [Sarcasm Strike] - Interesting point. Almost had me there.

Stay in character. This is a fun debate game for entertainment.`;

        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        document.getElementById('input').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 130) + 'px';
        });

        function addMsg(role, text, tactic) {
            const empty = document.getElementById('emptyState');
            if (empty) empty.remove();

            const typing = document.getElementById('typing');
            const chat = document.getElementById('chat');

            const msg = document.createElement('div');
            msg.className = `msg ${role}`;

            const av = document.createElement('div');
            av.className = `av ${role === 'ai' ? 'ai-av' : 'you-av'}`;
            av.textContent = role === 'ai' ? 'KM' : 'You';

            const wrap = document.createElement('div');
            wrap.className = 'bubble-wrap';

            const sender = document.createElement('div');
            sender.className = 'bubble-sender';
            sender.textContent = role === 'ai' ? 'Kalaham' : 'You';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (role === 'ai' && tactic) {
                const pill = document.createElement('div');
                pill.className = 'tactic-pill';
                pill.textContent = tactic;
                bubble.appendChild(pill);
                bubble.appendChild(document.createElement('br'));
            }

            const p = document.createElement('span');
            p.textContent = text;
            bubble.appendChild(p);

            wrap.appendChild(sender);
            wrap.appendChild(bubble);
            msg.appendChild(av);
            msg.appendChild(wrap);
            chat.insertBefore(msg, typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping(on) {
            document.getElementById('typing').className = on ? 'typing on' : 'typing';
            if (on) document.getElementById('chat').scrollTop = 9999;
        }

        function updateStats(tactic) {
            rounds++;
            dominance = Math.min(96, dominance + 7 + Math.random() * 11);
            const pct = Math.round(dominance);
            document.getElementById('roundNum').textContent = rounds;
            document.getElementById('dominanceFill').style.width = pct + '%';
            document.getElementById('dominancePct').textContent = pct + '%';
            if (tactic) document.getElementById('lastTactic').textContent = tactic;
        }

        async function send() {
            const input = document.getElementById('input');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            addMsg('user', text);
            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;
            showTyping(true);

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: SYSTEM,
                        messages: [{ role: 'user', content: text }]
                    })
                });

                const data = await res.json();
                const raw = data.content?.[0]?.text || "Nice try. But no.";

                let tactic = null, reply = raw;
                const m = raw.match(/^\[([^\]]+)\]\s*[-–—]?\s*/);
                if (m) { tactic = m[1]; reply = raw.replace(m[0], '').trim(); }

                showTyping(false);
                addMsg('ai', reply, tactic);
                updateStats(tactic);
            } catch {
                showTyping(false);
                addMsg('ai', "Even a glitch won't stop me from winning this.");
            }

            btn.disabled = false;
            input.focus();
        }
    </script>
</body>

</html>
